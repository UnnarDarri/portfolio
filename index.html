<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinematic Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<!-- Lenis -->
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

</head>

<body class="bg-black text-white overflow-x-hidden">

<!-- LOADING SCREEN -->
<div id="loader">
    <h1>CINEMATIC</h1>
</div>

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 bg-black/30 backdrop-blur-md border-b border-white/10">
<div class="max-w-7xl mx-auto flex justify-between px-6 py-4">
    <h1 class="tracking-[0.3em] uppercase text-sm">Your Name</h1>
    <div class="space-x-6 text-xs uppercase">
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>
</div>
</nav>

<!-- HERO -->
<section class="h-screen relative flex items-center justify-center">

<video autoplay muted loop playsinline class="absolute w-full h-full object-cover">
    <source src="showreel.mp4">
</video>

<div class="absolute inset-0 bg-black/60"></div>

<!-- film grain -->
<div class="grain"></div>

<!-- cinematic bars -->
<div class="bars"></div>

<div class="relative text-center">
    <h1 class="text-6xl md:text-8xl font-black tracking-widest">
        CINEMATIC
    </h1>
    <p class="text-gray-300 mt-4">Filmmaker • Editor • Cinematographer</p>

    <a href="#work" class="mt-8 inline-block border px-6 py-3 uppercase text-xs hover:bg-white hover:text-black transition">
        View Work
    </a>
</div>

</section>

<!-- WORK -->
<section id="work" class="py-32 px-6 max-w-7xl mx-auto">

<h2 class="text-4xl mb-16 opacity-70">Selected Work</h2>

<div class="grid md:grid-cols-2 gap-10">

<div class="project">
    <img src="images/myfilm.jpg">
    <h3>Short Film</h3>
</div>

<div class="project">
    <img src="images/p2.jpg">
    <h3>Commercial</h3>
</div>

<div class="project">
    <img src="images/p3.jpg">
    <h3>Music Video</h3>
</div>

</div>

</section>

<!-- ABOUT -->
<section id="about" class="py-32 px-6 max-w-4xl mx-auto">
<h2 class="text-4xl mb-6">About</h2>
<p class="text-gray-300 leading-relaxed">
I am an Icelandic filmmaker focused on cinematic storytelling,
natural light, and visual atmosphere.
</p>
</section>

<!-- CONTACT -->
<section id="contact" class="py-32 px-6 text-center">
<h2 class="text-4xl mb-6">Let's work</h2>
<a class="border px-8 py-4 uppercase text-xs hover:bg-white hover:text-black transition"
href="mailto:you@email.com">
Email Me
</a>
</section>

<footer class="py-10 text-center text-gray-600">
© 2026
</footer>

<script src="script.js"></script>
</body>
</html>
