<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const cinema = document.getElementById("cinema-thumb");

  if (!cinema) return;

  const images = [
    "images/rolegur-gaur-mynd1.jpg",
    "images/djupt-inn-i-skog-mynd1.jpg",
    "images/gesturinn-mynd1.jpg",
    "images/coulrophobia-mynd1.jpg"
  ];

  let i = 0;

  setInterval(() => {

    i = (i + 1) % images.length;

    cinema.style.transform = "translateX(30px)";
    cinema.style.opacity = "0";

    setTimeout(() => {
      cinema.src = images[i];
      cinema.style.transform = "translateX(-30px)";
    }, 200);

    setTimeout(() => {
      cinema.style.transform = "translateX(0)";
      cinema.style.opacity = "1";
    }, 400);

  }, 5000);

});
</script>

});
</script>
