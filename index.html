<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const cinema = document.getElementById("cinema-thumb");
  if (!cinema) return;

  const images = [
    "/static/images/rolegur-gaur-mynd1.jpg",
    "/static/images/djupt-inn-i-skog-mynd1.jpg",
    "/static/images/gesturinn-mynd1.jpg",
    "/static/images/coulrophobia-mynd1.jpg"
  ];

  // PRELOAD (IMPORTANT FIX FOR FLASH)
  images.forEach(src => {
    const img = new Image();
    img.src = src;
  });

  let i = 0;

  // create second layer image
  const ghost = cinema.cloneNode();
  ghost.style.position = "absolute";
  ghost.style.top = 0;
  ghost.style.left = 0;
  ghost.style.width = "100%";
  ghost.style.height = "100%";
  ghost.style.objectFit = "inherit";
  ghost.style.opacity = 0;
  ghost.style.transition = "opacity 0.6s ease";

  cinema.parentElement.style.position = "relative";
  cinema.parentElement.appendChild(ghost);

  setInterval(() => {

    i = (i + 1) % images.length;

    ghost.src = images[i];
    ghost.style.opacity = 1;
    cinema.style.opacity = 0;

    setTimeout(() => {
      cinema.src = images[i];
      cinema.style.opacity = 1;
      ghost.style.opacity = 0;
    }, 600);

  }, 5000);

});
</script>
