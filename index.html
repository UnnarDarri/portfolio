<!-- HERO SHOWREEL -->
<section class="hero">
  <video autoplay muted loop playsinline class="showreel">
    <source src="/static/videos/showreel.mp4" type="video/mp4">
  </video>

</section>

<main>
  <!-- CATEGORY SECTION -->
  <section class="categories">

    <figure class="cat-block">
      <figcaption class="cat-title">
        <a href="/cinematography">
          <span>Cinematography</span>
        </a>
      </figcaption>
      <div class="cat-img">
        <img src="/static/images/cinematography-thumb.jpg" id="cinema-thumb">
      </div>
    </figure>

    <figure class="cat-block">
      <figcaption class="cat-title">
        <a href="/photography">
          <span>Photography</span>
        </a>
      </figcaption>
      <div class="cat-img">
        <img src="/static/images/photography-thumb.jpg" id="photo-thumb">
      </div>
    </figure>

  </section>

  <!-- HIRE SECTION -->
  <section class="hire">

    <aside class="hire-text">
      <h2>HIRE ME!</h2>

      <p>
        Cinematographer & photographer based in Iceland.
        Focused on cinematic storytelling and visual emotion.
      </p>

      <a href="/about" class="btn">More</a>
    </aside>

    <aside class="hire-image">
      <img src="/static/images/portrait.jpg" alt="Portrait">
    </aside>

  </section>
</main>

<!-- SCRIPT -->
<script type="module">
  import initCategoryThumbnails from "{{ '/js/thumbnails.js' | htmlBaseUrl }}";

  const cinemaThumbnail = document.getElementById("cinema-thumb");
  const cinemaImages = [
    "{{ '/static/images/rolegur-gaur-mynd1.jpg' | htmlBaseUrl }}",
    "{{ '/static/images/djupt-inn-i-skog-mynd1.jpg' | htmlBaseUrl }}",
    "{{ '/static/images/gesturinn-mynd1.jpg' | htmlBaseUrl }}",
    "{{ '/static/images/coulrophobia-mynd1.jpg' | htmlBaseUrl }}"
  ];

  const photoThumbnail = document.getElementById("photo-thumb");
  const photoImages = cinemaImages;
  
  initCategoryThumbnails(cinemaThumbnail, cinemaImages);
  initCategoryThumbnails(photoThumbnail, photoImages);
</script>
