<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <img id="lightbox-img" src="">
</div>

<!-- PAGE TITLE -->
<section class="section">
  <h2>Photography</h2>
</section>

<!-- FUNKY GRID -->
<section class="photo-masonry">
  <img src="/static/images/ljosmynd-1.jpg">
  <img src="/static/images/ljosmynd-2.jpg">
  <img src="/static/images/ljosmynd-3.jpg">
  <img src="/static/images/ljosmynd-4.jpg">
  <img src="/static/images/ljosmynd-5.jpg">
  <img src="/static/images/ljosmynd-6.jpg">
  <img src="/static/images/ljosmynd-7.jpg">
  <img src="/static/images/ljosmynd-8.jpg">
  <img src="/static/images/ljosmynd-9.jpg">
  <img src="/static/images/ljosmynd-10.jpg">
  <img src="/static/images/ljosmynd-11.jpg">
  <img src="/static/images/ljosmynd-12.jpg">
</section>

<script>
  window.onload = function () {

    const images = document.querySelectorAll(".photo-masonry img");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    if (!lightbox || !lightboxImg) {
      console.log("Lightbox missing");
      return;
    }

    images.forEach((img) => {

      img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
      });

    });

    lightbox.addEventListener("click", () => {
      lightbox.style.display = "none";
      lightboxImg.src = "";
    });

  };
</script>
